<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PPT Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden;
  font-family: 'Segoe UI', sans-serif; user-select: none; }

/* ── Slide area ── */
#slide-area {
  position: absolute; top: 0; left: 0; right: 0; bottom: 36px;
  display: flex; align-items: center; justify-content: center;
  background: #111;
}
#slide-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  display: block;
}

/* ── Navbar ── */
#navbar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 36px;
  background: #1a1a2e; border-top: 1px solid #2a3a5a;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.nav-btn {
  background: #253550; border: 1px solid #3a4a6a; color: #ccc;
  border-radius: 5px; padding: 4px 14px; cursor: pointer;
  font-size: 0.82em; font-weight: 600; font-family: inherit;
  transition: all 0.15s;
}
.nav-btn:hover:not(:disabled) { background: #3a5070; color: #fff; border-color: #4fc3f7; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
#slide-counter {
  color: #7a9ab0; font-size: 0.82em; min-width: 120px; text-align: center;
  font-family: 'Consolas', monospace;
}
#close-btn {
  position: absolute; right: 8px;
  background: #3a1a1a; border-color: #6a2a2a; color: #e88;
}
#close-btn:hover { background: #8b1a1a; color: #fff; border-color: #f44; }

/* ── Loading screen ── */
#loading-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #080d1a; color: #4fc3f7; gap: 18px;
}
#loading-screen h2 { font-size: 1.1em; font-weight: 600; }
#loading-bar-wrap {
  width: 320px; height: 8px; background: #1a2a3a; border-radius: 4px; overflow: hidden;
}
#loading-bar {
  height: 100%; background: #4fc3f7; border-radius: 4px;
  width: 0%; transition: width 0.4s ease;
  animation: loadingPulse 1.2s ease-in-out infinite;
}
@keyframes loadingPulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.6; }
}
#loading-status { color: #7a9ab0; font-size: 0.85em; }

/* ── Error screen ── */
#error-screen {
  position: absolute; inset: 0; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: #080d1a; color: #f44336; gap: 14px;
}
#error-screen h2 { font-size: 1.1em; }
#error-screen p  { color: #7a8599; font-size: 0.85em; text-align: center; max-width: 480px; line-height: 1.6; }

/* ── JS fallback renderer ── */
#js-slide-area {
  position: absolute; top: 0; left: 0; right: 0; bottom: 36px;
  display: none; align-items: center; justify-content: center; background: #111;
}
#js-slide-canvas {
  width: 1280px; height: 720px;
  transform-origin: top left;
  background: #fff; overflow: hidden; position: relative;
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <h2>⏳ Đang chuyển đổi slide...</h2>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">LibreOffice đang xử lý file...</div>
</div>

<!-- Error screen -->
<div id="error-screen">
  <h2>⚠️ Không thể mở file</h2>
  <p id="error-msg">Có lỗi xảy ra khi mở file PowerPoint.</p>
</div>

<!-- Slide image area (LibreOffice mode) -->
<div id="slide-area" style="display:none">
  <img id="slide-img" src="" alt="Slide">
</div>

<!-- JS fallback area -->
<div id="js-slide-area">
  <div id="js-slide-canvas"></div>
</div>

<!-- Navigation bar -->
<div id="navbar" style="display:none">
  <button class="nav-btn" id="btn-prev" onclick="prevSlide()">◀ Trước</button>
  <span id="slide-counter">Slide 1 / 1</span>
  <button class="nav-btn" id="btn-next" onclick="nextSlide()">Tiếp ▶</button>
  <button class="nav-btn" id="close-btn" onclick="window.close()">✕ Đóng</button>
</div>

<script>
// nodeIntegration: true — có thể dùng require trực tiếp
const fs   = require('fs');
const path = require('path');
const JSZipLib = require(path.join(__dirname, 'node_modules', 'jszip'));

let slides = [];
let currentIdx = 0;
const params = new URLSearchParams(location.search);
const mode   = params.get('mode');

// ── SLIDE IMAGE MODE (LibreOffice) ──
function initSlidesMode() {
  try {
    slides = JSON.parse(params.get('slides') || '[]');
  } catch (e) {
    slides = [];
  }

  if (slides.length === 0) {
    showError('Không tìm thấy file ảnh nào sau khi chuyển đổi.<br>Hãy thử lại hoặc kiểm tra LibreOffice.');
    return;
  }

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('slide-area').style.display = 'flex';
  document.getElementById('navbar').style.display = 'flex';
  showSlide(0);
}

function showSlide(idx) {
  if (idx < 0) idx = 0;
  if (idx >= slides.length) idx = slides.length - 1;
  currentIdx = idx;

  const imgEl = document.getElementById('slide-img');
  // Dùng file:// protocol + encode path
  imgEl.src = 'file:///' + slides[idx].replace(/\\/g, '/');

  document.getElementById('slide-counter').textContent =
    'Slide ' + (idx + 1) + ' / ' + slides.length;
  document.getElementById('btn-prev').disabled = (idx === 0);
  document.getElementById('btn-next').disabled = (idx === slides.length - 1);
}

function prevSlide() { showSlide(currentIdx - 1); }
function nextSlide() { showSlide(currentIdx + 1); }

// ── JS FALLBACK MODE (jszip + XML parser) ──
async function initJsMode() {
  const filePath = params.get('file');
  if (!filePath) { showError('Không có đường dẫn file.'); return; }

  try {
    // Đọc file
    const data = fs.readFileSync(filePath);

    const zip  = await JSZipLib.loadAsync(data);
    const slideFiles = Object.keys(zip.files)
      .filter(n => /^ppt\/slides\/slide\d+\.xml$/i.test(n))
      .sort((a, b) => {
        const na = parseInt(a.match(/\d+/)[0]);
        const nb = parseInt(b.match(/\d+/)[0]);
        return na - nb;
      });

    if (slideFiles.length === 0) {
      showError('Không tìm thấy slide nào trong file PPTX.');
      return;
    }

    // Lấy media (hình ảnh) dưới dạng base64
    const media = {};
    for (const [name, file] of Object.entries(zip.files)) {
      if (name.startsWith('ppt/media/') && !file.dir) {
        const ext  = name.split('.').pop().toLowerCase();
        const mime = { png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
                       gif:'image/gif', svg:'image/svg+xml', emf:'image/x-emf' }[ext] || 'image/png';
        const b64  = await file.async('base64');
        media[name.split('/').pop()] = 'data:' + mime + ';base64,' + b64;
      }
    }

    // Parse từng slide XML
    slides = [];
    for (const slideFile of slideFiles) {
      const xmlStr = await zip.files[slideFile].async('string');
      slides.push(parseSlideXml(xmlStr, media));
    }

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('js-slide-area').style.display  = 'flex';
    document.getElementById('navbar').style.display = 'flex';

    scaleJsCanvas();
    showJsSlide(0);
  } catch (e) {
    showError('Lỗi khi đọc file: ' + e.message);
  }
}

const EMU = 914400; // 1 inch = 914400 EMU; với 96 DPI → 1 EMU = 96/914400 px
const SLIDE_W_PX = 1280;
const SLIDE_H_PX = 720;
const SLIDE_W_EMU = 9144000;
const SLIDE_H_EMU = 5143500;

function emuToPx(emu, refEmu, refPx) {
  return Math.round((parseInt(emu) || 0) / refEmu * refPx);
}

function parseSlideXml(xmlStr, media) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(xmlStr, 'application/xml');
  const shapes = [];

  // Background color từ slide (p:bg/p:bgPr/a:solidFill/a:srgbClr)
  let bgColor = '#fff';
  const bgClr = doc.querySelector('bg bgPr solidFill srgbClr, bg bgPr solidFill sysClr');
  if (bgClr) bgColor = '#' + (bgClr.getAttribute('val') || bgClr.getAttribute('lastClr') || 'ffffff');

  // Shape list
  doc.querySelectorAll('sp').forEach(sp => {
    const xfrm = sp.querySelector('spPr xfrm');
    if (!xfrm) return;
    const off  = xfrm.querySelector('off');
    const ext  = xfrm.querySelector('ext');
    if (!off || !ext) return;

    const x = emuToPx(off.getAttribute('x'), SLIDE_W_EMU, SLIDE_W_PX);
    const y = emuToPx(off.getAttribute('y'), SLIDE_H_EMU, SLIDE_H_PX);
    const w = emuToPx(ext.getAttribute('cx'), SLIDE_W_EMU, SLIDE_W_PX);
    const h = emuToPx(ext.getAttribute('cy'), SLIDE_H_EMU, SLIDE_H_PX);

    // Fill color
    let fillColor = 'transparent';
    const fillClr = sp.querySelector('spPr solidFill srgbClr');
    if (fillClr) fillColor = '#' + fillClr.getAttribute('val');

    // Text
    const textParts = [];
    sp.querySelectorAll('txBody p').forEach(para => {
      let paraText = '';
      para.querySelectorAll('r').forEach(run => {
        const t = run.querySelector('t');
        if (t) paraText += t.textContent;
      });
      if (paraText) textParts.push(paraText);
    });

    // Font size (pt) — từ run props đầu tiên
    let fontSize = 18;
    const sz = sp.querySelector('txBody r rPr');
    if (sz && sz.getAttribute('sz')) fontSize = Math.round(parseInt(sz.getAttribute('sz')) / 100);

    // Text color
    let textColor = '#000';
    const txClr = sp.querySelector('txBody r rPr solidFill srgbClr');
    if (txClr) textColor = '#' + txClr.getAttribute('val');

    // Bold / italic
    const bold   = sz && sz.getAttribute('b') === '1';
    const italic = sz && sz.getAttribute('i') === '1';

    // Alignment
    const algn = sp.querySelector('txBody p pPr');
    const align = algn ? ({ l:'left', r:'right', ctr:'center', just:'justify' }[algn.getAttribute('algn')] || 'left') : 'left';

    // Vertical alignment
    const anchr = sp.querySelector('txBody bodyPr');
    const vAlign = anchr ? ({ t:'flex-start', ctr:'center', b:'flex-end' }[anchr.getAttribute('anchor')] || 'flex-start') : 'flex-start';

    shapes.push({ type: 'text', x, y, w, h, fillColor, textParts, fontSize, textColor, bold, italic, align, vAlign });
  });

  // Images (p:pic)
  doc.querySelectorAll('pic').forEach(pic => {
    const xfrm = pic.querySelector('spPr xfrm');
    if (!xfrm) return;
    const off = xfrm.querySelector('off');
    const ext = xfrm.querySelector('ext');
    if (!off || !ext) return;

    const x = emuToPx(off.getAttribute('x'), SLIDE_W_EMU, SLIDE_W_PX);
    const y = emuToPx(off.getAttribute('y'), SLIDE_H_EMU, SLIDE_H_PX);
    const w = emuToPx(ext.getAttribute('cx'), SLIDE_W_EMU, SLIDE_W_PX);
    const h = emuToPx(ext.getAttribute('cy'), SLIDE_H_EMU, SLIDE_H_PX);

    const blip   = pic.querySelector('blip');
    const rEmbed = blip ? blip.getAttribute('r:embed') || blip.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships', 'embed') : null;

    shapes.push({ type: 'image', x, y, w, h, rEmbed });
  });

  return { bgColor, shapes };
}

function showJsSlide(idx) {
  if (idx < 0) idx = 0;
  if (idx >= slides.length) idx = slides.length - 1;
  currentIdx = idx;

  const slide  = slides[idx];
  const canvas = document.getElementById('js-slide-canvas');
  canvas.style.background = slide.bgColor;
  canvas.innerHTML = '';

  slide.shapes.forEach(s => {
    const div = document.createElement('div');
    div.style.cssText = [
      'position:absolute',
      `left:${s.x}px`, `top:${s.y}px`,
      `width:${s.w}px`, `height:${s.h}px`,
      'overflow:hidden'
    ].join(';');

    if (s.type === 'text') {
      div.style.background   = s.fillColor;
      div.style.display      = 'flex';
      div.style.flexDirection = 'column';
      div.style.justifyContent = s.vAlign;
      div.style.padding      = '4px';
      s.textParts.forEach(line => {
        const p  = document.createElement('p');
        p.style.cssText = [
          `font-size:${s.fontSize}px`,
          `color:${s.textColor}`,
          s.bold   ? 'font-weight:700'  : '',
          s.italic ? 'font-style:italic' : '',
          `text-align:${s.align}`,
          'line-height:1.35', 'word-break:break-word'
        ].filter(Boolean).join(';');
        p.textContent = line;
        div.appendChild(p);
      });
    } else if (s.type === 'image') {
      const img = document.createElement('img');
      img.style.cssText = 'width:100%;height:100%;object-fit:contain';
      // rEmbed lookup — sẽ cần rels file để map rId → filename; fallback
      img.alt = '';
      div.appendChild(img);
    }

    canvas.appendChild(div);
  });

  document.getElementById('slide-counter').textContent =
    'Slide ' + (idx + 1) + ' / ' + slides.length;
  document.getElementById('btn-prev').disabled = (idx === 0);
  document.getElementById('btn-next').disabled = (idx === slides.length - 1);
}

function showJsSlideNav(delta) {
  showJsSlide(currentIdx + delta);
}

function scaleJsCanvas() {
  const area = document.getElementById('js-slide-area');
  const canvas = document.getElementById('js-slide-canvas');
  const scaleX = area.clientWidth  / SLIDE_W_PX;
  const scaleY = area.clientHeight / SLIDE_H_PX;
  const scale  = Math.min(scaleX, scaleY);
  canvas.style.transform = `scale(${scale})`;
  // Center after scale
  const scaledW = SLIDE_W_PX * scale;
  const scaledH = SLIDE_H_PX * scale;
  canvas.style.marginLeft = ((area.clientWidth  - scaledW) / 2) + 'px';
  canvas.style.marginTop  = ((area.clientHeight - scaledH) / 2) + 'px';
}

// Override prev/next for JS mode
function prevSlide() {
  if (mode === 'js') showJsSlide(currentIdx - 1);
  else showSlide(currentIdx - 1);
}
function nextSlide() {
  if (mode === 'js') showJsSlide(currentIdx + 1);
  else showSlide(currentIdx + 1);
}

// ── Error display ──
function showError(msg, isHtml) {
  document.getElementById('loading-screen').style.display = 'none';
  const err = document.getElementById('error-screen');
  err.style.display = 'flex';
  if (isHtml) document.getElementById('error-msg').innerHTML = msg;
  else document.getElementById('error-msg').textContent = msg;
  document.getElementById('navbar').style.display = 'flex';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').disabled = true;
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape')     window.close();
});

window.addEventListener('resize', () => {
  if (mode === 'js') scaleJsCanvas();
});

// ── Init ──
if (mode === 'slides') initSlidesMode();
else if (mode === 'js') initJsMode();
// mode === 'loading': giữ loading screen cho đến khi main.js load lại trang
</script>
</body>
</html>
